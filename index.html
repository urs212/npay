<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>입금 확인 시스템</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #007bff; color: white; font-weight: bold; cursor: pointer; }
        #status { margin-top: 20px; font-size: 1.1rem; font-weight: bold; }
        .success { color: #28a745; }
        .fail { color: #dc3545; }
        #debug { margin-top: 10px; font-size: 0.8rem; color: #999; word-break: break-all; }
    </style>
</head>
<body>

<div class="container">
    <h2>금액 입력</h2>
    <input type="number" id="targetAmount" placeholder="예: 10000" />
    <button onclick="checkDeposit()">입금 확인하기</button>
    <div id="status"></div>
    <div id="debug"></div>
</div>

<script>
    // ⚠️ 여기에 Pushbullet 계정 설정에서 만든 Access Token을 넣으세요.
    const API_TOKEN = 'o.uVBmUrvbFOlba1bu0Gj8ArmHD2jmLBo9'; 

    async function checkDeposit() {
        const targetAmount = document.getElementById('targetAmount').value;
        const statusDiv = document.getElementById('status');
        const debugDiv = document.getElementById('debug');

        if (!targetAmount) {
            alert("금액을 먼저 입력해주세요.");
            return;
        }

        statusDiv.innerHTML = "조회 중...";
        debugDiv.innerHTML = "";

        try {
            const response = await fetch('https://api.pushbullet.com/v2/pushes?limit=10', {
                method: 'GET',
                headers: {
                    'Access-Token': API_TOKEN,
                    'Content-Type': 'application/json'
                }
            });

            // 401 에러 체크
            if (response.status === 401) {
                statusDiv.innerHTML = '<span class="fail">❌ API 토큰 인증 실패</span>';
                debugDiv.innerHTML = "토큰이 정확한지 확인하세요. (401 Unauthorized)";
                return;
            }

            const data = await response.json();
            
            // 데이터 구조 안전하게 가져오기
            const pushes = data.pushes || [];
            
            if (pushes.length === 0) {
                statusDiv.innerHTML = '<span class="fail">❌ 최근 알림 없음</span>';
                debugDiv.innerHTML = "Pushbullet에 기록된 최근 푸시가 없습니다.";
                return;
            }

            let isFound = false;
            for (let push of pushes) {
                // 제목과 본문을 합쳐서 검색
                const fullText = (push.title || "") + " " + (push.body || "");
                // 숫자만 추출 (쉼표 제거)
                const numbers = fullText.replace(/,/g, "").match(/\d+/g);
                
                if (numbers && numbers.includes(targetAmount)) {
                    isFound = true;
                    break;
                }
            }

            if (isFound) {
                statusDiv.innerHTML = '<span class="success">✅ 입금확인!</span>';
            } else {
                statusDiv.innerHTML = '<span class="fail">❌ 내역 없음</span>';
                debugDiv.innerHTML = "최근 10개 알림 중 해당 금액이 없습니다.";
            }

        } catch (e) {
            console.error(e);
            statusDiv.innerHTML = '<span class="fail">⚠️ 연결 오류</span>';
            debugDiv.innerHTML = e.message;
        }
    }
</script>
</body>
</html>
