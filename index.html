<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>입금 확인 시스템</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        h2 { color: #333; margin-bottom: 20px; font-size: 1.2rem; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #007bff; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0056b3; }
        #status { margin-top: 20px; font-size: 1.1rem; font-weight: bold; min-height: 24px; }
        .success { color: #28a745; animation: bounce 0.5s; }
        .searching { color: #666; }
        .fail { color: #dc3545; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    </style>
</head>
<body>

<div class="container">
    <h2>금액을 입력하세요</h2>
    <input type="number" id="targetAmount" placeholder="예: 10000" />
    <button onclick="checkDeposit()">입금 확인하기</button>
    <div id="status"></div>
</div>

<script>
    // ⚠️ 주의: 실제 서비스 시에는 서버(Node.js 등)를 거치는 것이 보안상 안전합니다.
    const API_TOKEN = 'o.uVBmUrvbFOlba1bu0Gj8ArmHD2jmLBo9'; 

    async function checkDeposit() {
        const targetAmount = document.getElementById('targetAmount').value;
        const statusDiv = document.getElementById('status');

        if (!targetAmount) {
            alert("금액을 입력해 주세요.");
            return;
        }

        statusDiv.innerHTML = '<span class="searching">최근 알림 확인 중...</span>';

        try {
            // Pushbullet에서 최근 받은 푸시 목록 가져오기 (최신 10개)
            const response = await fetch('https://api.pushbullet.com/v2/pushes?limit=10', {
                method: 'GET',
                headers: {
                    'Access-Token': API_TOKEN,
                    'Content-Type': 'application/json'
                }
            });

            const data = await response.json();
            const pushes = data.pushes;

            // 알림 본문(body)이나 제목(title)에서 숫자만 추출하여 매칭 확인
            let isFound = false;
            
            for (let push of pushes) {
                if (push.body || push.title) {
                    const fullText = (push.title || "") + " " + (push.body || "");
                    // 텍스트에서 숫자만 추출 (쉼표 제거 포함)
                    const extractedNumbers = fullText.replace(/,/g, "").match(/\d+/g);
                    
                    if (extractedNumbers && extractedNumbers.includes(targetAmount)) {
                        isFound = true;
                        break;
                    }
                }
            }

            if (isFound) {
                statusDiv.innerHTML = '<span class="success">✅ 입금확인!</span>';
            } else {
                statusDiv.innerHTML = '<span class="fail">❌ 내역 없음 (다시 시도)</span>';
            }

        } catch (error) {
            console.error(error);
            statusDiv.innerHTML = '<span class="fail">오류 발생 (콘솔 확인)</span>';
        }
    }
</script>

</body>
</html>
