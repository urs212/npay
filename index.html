<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>MIDCORE 입금 확인</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #1c1e21; margin-bottom: 25px; font-weight: 700; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border: 2px solid #e4e6eb; border-radius: 12px; font-size: 18px; box-sizing: border-box; transition: 0.2s; }
        input:focus { border-color: #007bff; outline: none; }
        button { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #bcc0c4; cursor: not-allowed; }
        #status { margin-top: 25px; font-size: 1.2rem; font-weight: 700; min-height: 30px; }
        .success { color: #28a745; border: 2px solid #28a745; padding: 10px; border-radius: 10px; }
        .error { color: #dc3545; }
        .loading { color: #606770; }
    </style>
</head>
<body>

<div class="box">
    <h2>금액 입력</h2>
    <input type="number" id="amount" placeholder="입금하신 금액 (숫자만)" onkeypress="if(event.keyCode==13) check();">
    <button id="btn" onclick="check()">확인하기</button>
    <div id="status"></div>
</div>

<script>
    async function check() {
        const amount = document.getElementById('amount').value;
        const status = document.getElementById('status');
        const btn = document.getElementById('btn');

        if (!amount) return alert("금액을 입력해주세요.");

        status.innerHTML = '<span class="loading">입금 내역 확인 중...</span>';
        btn.disabled = true;

        try {
            // PHP 프록시를 통해 안전하게 데이터를 가져옵니다.
            const res = await fetch(`check.php`);
            
            if (res.status === 401) {
                status.innerHTML = '<span class="error">서버 토큰 설정 오류 (401)</span>';
                return;
            }

            const data = await res.json();
            const pushes = data.pushes || [];
            
            let found = false;
            for (const p of pushes) {
                const text = (p.title || "") + " " + (p.body || "");
                // 숫자 매칭 (쉼표 제거 후 비교)
                const nums = text.replace(/,/g, "").match(/\d+/g);
                if (nums && nums.includes(amount)) {
                    found = true;
                    break;
                }
            }

            if (found) {
                status.innerHTML = '<span class="success">✅ 입금확인!</span>';
            } else {
                status.innerHTML = '<span class="error">❌ 일치하는 내역이 없습니다.</span>';
            }
        } catch (e) {
            status.innerHTML = '<span class="error">연결 오류가 발생했습니다.</span>';
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
